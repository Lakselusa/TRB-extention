<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrimbimTools</title>
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0c1018;--panel:#111820;--card:#161e2a;
      --border:#1e2a3a;--text:#d4dce8;--dim:#5a7089;--bright:#f0f4f8;
      --blue:#2e8cf0;--green:#0dca73;--red:#f04848;--amber:#e8a820;
      --mono:'IBM Plex Mono',Consolas,monospace;
      --sans:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
    .hdr{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;justify-content:space-between}
    .hdr h1{font-size:14px;font-weight:700;color:var(--bright)}
    .hdr .sub{font-size:11px;color:var(--dim);font-family:var(--mono)}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .cnt{padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
    .sec{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
    .sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:8px}
    .btn{width:100%;padding:9px 12px;border-radius:5px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .1s;margin-top:4px}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-b{border:1px solid var(--blue);background:rgba(46,140,240,.1);color:var(--blue)}
    .btn-g{border:1px solid var(--green);background:rgba(13,202,115,.08);color:var(--green)}
    .btn-a{border:1px solid var(--amber);background:rgba(232,168,32,.08);color:var(--amber)}
    .btn-d{border:1px solid var(--border);background:transparent;color:var(--dim)}
    .sts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin:8px 0}
    .st{text-align:center;padding:6px 4px;border-radius:5px;border:1px solid var(--border)}
    .st-v{font-size:18px;font-weight:800;font-family:var(--mono)}
    .st-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-top:2px}
    .mi{padding:7px 9px;border:1px solid var(--border);border-radius:5px;margin-bottom:3px;display:flex;align-items:center;gap:8px}
    .mi .ic{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .mi .nm{font-size:12px;font-weight:600;color:var(--bright);flex:1}
    .mi .tp{font-size:10px;color:var(--dim);font-family:var(--mono)}
    .ir{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}
    .ir .l{color:var(--dim)}.ir .v{font-family:var(--mono);font-weight:600}
    .lb{max-height:200px;overflow-y:auto}
    .ll{font-size:10px;font-family:var(--mono);padding:2px 5px;border-radius:3px;line-height:1.4;word-break:break-word;margin-bottom:1px}
    .ll.i{color:var(--dim)}.ll.s{color:var(--green);background:rgba(13,202,115,.06)}
    .ll.w{color:var(--amber);background:rgba(232,168,32,.06)}.ll.e{color:var(--red);background:rgba(240,72,72,.06)}
    .ht{font-size:11px;color:var(--dim);line-height:1.5;padding:7px 9px;border:1px dashed var(--border);border-radius:5px;margin-top:6px}
    .snap{width:100%;border-radius:5px;border:1px solid var(--border);margin-top:6px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>TrimbimTools</h1>
    <div class="sub" id="pn">Connecting...</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="dot" id="dt" style="background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 1.5s ease-in-out infinite"></div>
    <span style="font-size:10px;font-family:var(--mono);color:var(--dim)" id="dl">Connecting</span>
  </div>
</div>

<div class="cnt" id="ui">
  <div class="sec"><div class="sec-t">Initializing</div>
    <div style="text-align:center;padding:24px;color:var(--dim);font-size:12px">Connecting to Trimble Connect...</div>
  </div>
</div>

<script>
(async function(){
  var API, token, models=[], scan=null, logs=[], snapUrl=null;
  var $ui=document.getElementById('ui'), $pn=document.getElementById('pn');
  var $dt=document.getElementById('dt'), $dl=document.getElementById('dl');

  function e(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function st(p){
    var c=p==='ready'?'var(--green)':p==='error'?'var(--red)':'var(--amber)';
    $dt.style.background=c;$dt.style.boxShadow='0 0 6px '+c;
    $dt.style.animation=p==='connecting'?'pulse 1.5s ease-in-out infinite':'none';
    $dl.textContent=p==='ready'?'Live':p==='error'?'Error':'Connecting';
  }
  function log(m,t){
    t=t||'i';
    var ts=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    logs.push({m:m,t:t,ts:ts});
    if(logs.length>120)logs.shift();
    rl();console.log('[TT]',m);
  }

  // Extract runtime IDs from a getObjects result entry
  // The API may return .objects (ObjectProperties[]) or .objectRuntimeIds (number[])
  function extractIds(entry){
    if(!entry) return [];
    // Direct array of runtime IDs
    if(entry.objectRuntimeIds && Array.isArray(entry.objectRuntimeIds))
      return entry.objectRuntimeIds;
    // Array of ObjectProperties — extract runtimeId from each
    if(entry.objects && Array.isArray(entry.objects)){
      var ids=[];
      for(var i=0;i<entry.objects.length;i++){
        var o=entry.objects[i];
        var id = o.objectRuntimeId ?? o.runtimeId ?? o.entityId ?? o.id;
        if(id!=null) ids.push(id);
      }
      return ids;
    }
    return [];
  }

  function countAll(arr){
    if(!arr) return 0;
    var n=0;
    for(var i=0;i<arr.length;i++) n+=extractIds(arr[i]).length;
    return n;
  }

  // ── INIT ───────────────────────────────────────────────────────────────
  try{
    log('Connecting to Trimble Connect...');
    API=await TrimbleConnectWorkspace.connect(window.parent,function(ev,d){
      if(ev==='extension.accessToken'){token=(d&&d.data)?d.data:d;log('Token refreshed','s');}
      if(ev==='viewer.modelState.changed'){log('Model state changed');loadModels();}
    },30000);
    log('Connected!','s');

    var tr=await API.extension.requestPermission('accesstoken');
    if(tr==='denied') throw new Error('Token permission denied');
    if(tr==='pending') log('Waiting for user consent...','w');
    else{token=tr;log('Token OK','s');}

    var proj=await API.project.getProject();
    $pn.textContent=proj?(proj.name||proj.id):'Unknown';
    log('Project: '+(proj?proj.name||proj.id:'?'),'s');

    st('ready');
    await loadModels();
    render();
  }catch(err){log('INIT FAILED: '+err.message,'e');st('error');}

  // ── LOAD MODELS (only LOADED, show by name) ───────────────────────────
  async function loadModels(){
    if(!API)return;
    try{
      var all=await API.viewer.getModels();
      // Filter to only loaded models
      models=(all||[]).filter(function(m){return m.state==='LOADED';});
      log('Loaded models: '+models.length+' of '+(all?all.length:0)+' total','s');
      render();
    }catch(err){log('getModels error: '+err.message,'e');}
  }

  // ── SCAN VISIBILITY ───────────────────────────────────────────────────
  async function doScan(){
    if(!API)return;
    log('Scanning visibility...');
    try{
      var rawAll=await API.viewer.getObjects()||[];
      var rawVis=await API.viewer.getObjects(undefined,{visible:true})||[];
      var rawHid=await API.viewer.getObjects(undefined,{visible:false})||[];

      // Log the shape once for debugging
      if(rawAll.length>0){
        var f=rawAll[0];
        log('Data shape: keys=['+Object.keys(f).join(',')+']');
        var ids=extractIds(f);
        log('Objects in first model: '+ids.length+' (extracted via '+(f.objectRuntimeIds?'objectRuntimeIds':'objects')+')');
      }

      var nA=countAll(rawAll), nV=countAll(rawVis), nH=countAll(rawHid);

      // Build per-model breakdown for the visible set
      var breakdown=[];
      for(var i=0;i<rawVis.length;i++){
        var mid=rawVis[i].modelId;
        var vIds=extractIds(rawVis[i]);
        // Find matching model name
        var mName=mid;
        for(var j=0;j<models.length;j++){
          if(models[j].id===mid||models[j].versionId===mid){
            mName=models[j].name||mid;break;
          }
        }
        // Count hidden for same model
        var hIds=[];
        for(var k=0;k<rawHid.length;k++){
          if(rawHid[k].modelId===mid) hIds=extractIds(rawHid[k]);
        }
        breakdown.push({modelId:mid,name:mName,visCount:vIds.length,hidCount:hIds.length,visIds:vIds});
      }

      scan={all:rawAll,vis:rawVis,hid:rawHid,nA:nA,nV:nV,nH:nH,breakdown:breakdown};
      snapUrl=null;
      log('Scan done — '+nA+' total, '+nV+' visible, '+nH+' hidden','s');
      render();
    }catch(err){log('Scan error: '+err.message,'e');}
  }

  // ── RESET VISIBILITY ──────────────────────────────────────────────────
  async function doReset(){
    if(!API)return;
    try{
      await API.viewer.setObjectState(undefined,{visible:'reset'});
      log('Visibility reset','s');
      await doScan();
    }catch(err){log('Reset error: '+err.message,'e');}
  }

  // ── EXPORT: isolate visible + create filtered trimbim + snapshot ───────
  async function doExport(){
    if(!API||!scan||scan.nV===0)return;
    log('══ EXPORT START ══');

    try{
      for(var i=0;i<scan.vis.length;i++){
        var entry=scan.vis[i];
        var mid=entry.modelId;
        var rids=extractIds(entry);

        // Find model name
        var mName=mid;
        for(var j=0;j<models.length;j++){
          if(models[j].id===mid||models[j].versionId===mid){mName=models[j].name;break;}
        }

        if(rids.length===0){log('  '+mName+': no visible IDs, skip','w');continue;}
        log('  '+mName+': '+rids.length+' visible objects');

        // 1) Isolate — shows only these objects in the viewer
        try{
          await API.viewer.isolateEntities([{modelId:mid,entityIds:rids}]);
          log('  Isolated in viewer — only visible objects shown','s');
        }catch(err){log('  isolateEntities: '+err.message,'e');}

        // 2) Try addTrimbimModel with selector for a filtered TRB
        try{
          var trbId='trimbim_export_'+Date.now();
          await API.viewer.addTrimbimModel({
            id:trbId,
            trbBlobFromId:mid,
            visible:true,
            fitToView:false,
            selector:{
              modelObjectIds:[{modelId:mid,objectRuntimeIds:rids}]
            }
          });
          log('  Filtered TRB added to viewer: '+trbId,'s');
        }catch(err){
          log('  addTrimbimModel: '+err.message,'w');
          log('  (Filtered TRB not supported — isolate view is active)','i');
        }

        // 3) Convert some IDs to IFC GUIDs for reference
        try{
          var ext=await API.viewer.convertToObjectIds(mid,rids.slice(0,5));
          log('  IFC GUIDs (sample): '+ext.join(', '),'s');
        }catch(err){log('  convertToObjectIds: '+err.message,'w');}
      }

      // 4) Capture snapshot of the filtered view
      try{
        var snap=await API.viewer.getSnapshot();
        if(snap){
          snapUrl=snap;
          log('  Snapshot captured','s');
        }
      }catch(err){log('  Snapshot: '+err.message,'w');}

      log('══ EXPORT COMPLETE ══','s');
      log('The viewer now shows only visible objects. Use TC Desktop to export as .trb if needed.','i');
      render();
    }catch(err){log('Export error: '+err.message,'e');}
  }

  // ── RENDER ─────────────────────────────────────────────────────────────
  function render(){
    var h='';

    // Models — only LOADED, shown by name
    h+='<div class="sec"><div class="sec-t">Models in Viewer</div>';
    if(models.length===0){
      h+='<div style="color:var(--dim);font-size:11px;text-align:center;padding:8px 0">No models loaded in viewer.</div>';
    }else{
      for(var i=0;i<models.length;i++){
        var m=models[i];
        h+='<div class="mi">';
        h+='<div class="ic" style="background:var(--green)"></div>';
        h+='<div class="nm">'+e(m.name||'Unnamed')+'</div>';
        h+='<div class="tp">'+e(m.type||'')+'</div>';
        h+='</div>';
      }
    }
    h+='<button class="btn btn-d" onclick="W._lm()">Refresh</button>';
    h+='</div>';

    // Scan
    h+='<div class="sec"><div class="sec-t">Object Visibility</div>';
    h+='<button class="btn btn-b" onclick="W._sc()">Scan Visibility</button>';
    if(scan){
      h+='<div class="sts">';
      h+='<div class="st"><div class="st-v" style="color:var(--blue)">'+scan.nA+'</div><div class="st-l">Total</div></div>';
      h+='<div class="st"><div class="st-v" style="color:var(--green)">'+scan.nV+'</div><div class="st-l">Visible</div></div>';
      h+='<div class="st"><div class="st-v" style="color:var(--red)">'+scan.nH+'</div><div class="st-l">Hidden</div></div>';
      h+='</div>';

      // Per-model breakdown by name
      for(var i=0;i<scan.breakdown.length;i++){
        var b=scan.breakdown[i];
        h+='<div style="padding:6px 9px;border:1px solid var(--border);border-radius:5px;margin-bottom:3px">';
        h+='<div style="font-size:12px;font-weight:600;color:var(--bright)">'+e(b.name)+'</div>';
        h+='<div style="font-size:11px;margin-top:2px">';
        h+='<span style="color:var(--green)">'+b.visCount+' visible</span>';
        h+=' · <span style="color:var(--red)">'+b.hidCount+' hidden</span>';
        h+='</div></div>';
      }
      h+='<button class="btn btn-a" onclick="W._rs()">Show All (Reset)</button>';
    }else{
      h+='<div class="ht">Hide objects in the 3D viewer, then click "Scan Visibility" to see which are visible vs hidden.</div>';
    }
    h+='</div>';

    // Export
    h+='<div class="sec"><div class="sec-t">Export Visible Objects</div>';
    var cv=scan?scan.nV:0, ch=scan?scan.nH:0;
    h+='<div style="padding:6px 0">';
    h+='<div class="ir"><span class="l">Will keep</span><span class="v" style="color:var(--green)">'+cv+' objects</span></div>';
    h+='<div class="ir"><span class="l">Will remove</span><span class="v" style="color:var(--red)">'+ch+' objects</span></div>';
    h+='</div>';
    h+='<button class="btn btn-g" onclick="W._ex()"'+(cv>0?'':' disabled')+'>';
    h+=cv>0?'Export '+cv+' visible objects':'Scan objects first';
    h+='</button>';
    if(snapUrl){
      h+='<div class="sec-t" style="margin-top:10px;margin-bottom:4px">Export Snapshot</div>';
      h+='<img class="snap" src="'+snapUrl+'" alt="Filtered view snapshot" />';
      h+='<a href="'+snapUrl+'" download="trimbim-export.png" style="display:block;margin-top:4px">';
      h+='<button class="btn btn-d" style="width:100%">Download Snapshot</button></a>';
    }
    h+='<div class="ht" style="margin-top:8px"><strong>How export works:</strong><br>';
    h+='1. Isolates visible objects in the viewer<br>';
    h+='2. Creates a filtered TRB reference in viewer<br>';
    h+='3. Captures a snapshot of the result<br><br>';
    h+='For a downloadable .trb file, use Trimble Connect Desktop → "Export as TRB" after applying the same visibility filter.</div>';
    h+='</div>';

    // Log
    h+='<div class="sec"><div class="sec-t">Log ('+logs.length+')</div>';
    h+='<div class="lb" id="lbx"></div>';
    if(logs.length>0) h+='<button class="btn btn-d" onclick="W._cl()" style="font-size:10px;padding:5px">Clear</button>';
    h+='</div>';

    $ui.innerHTML=h;
    rl();
  }

  function rl(){
    var b=document.getElementById('lbx');if(!b)return;
    var h='';
    var cls={i:'i',s:'s',w:'w',e:'e'};
    for(var i=logs.length-1;i>=Math.max(0,logs.length-60);i--){
      var l=logs[i];
      h+='<div class="ll '+cls[l.t]+'"><span style="opacity:.4">'+l.ts+'</span> '+e(l.m)+'</div>';
    }
    b.innerHTML=h;
  }

  // Global bindings
  window.W={_sc:doScan,_rs:doReset,_ex:doExport,_lm:loadModels,_cl:function(){logs.length=0;render();}};
})();
</script>
</body>
</html>
