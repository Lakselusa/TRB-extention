<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrimBIM Export — TC 3D Extension</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#101218;--surface:#181b24;--surface-2:#1e2230;--surface-hover:#242838;--border:#2a2f40;--border-bright:#363c52;--text:#e2e5ed;--text-dim:#8b92a8;--text-muted:#505770;--accent:#4f8ff7;--accent-glow:rgba(79,143,247,.12);--green:#3dd68c;--green-glow:rgba(61,214,140,.12);--orange:#f5a623;--red:#ef6b6b;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#4f8ff7,#3dd68c);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar h1{font-size:13px;font-weight:700;letter-spacing:-.01em}
.topbar h1 span{color:var(--accent);font-weight:500}
.topbar-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.status-dot{width:6px;height:6px;border-radius:50%;transition:all .3s}
.status-dot.off{background:var(--text-muted)}
.status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.busy{background:var(--orange);box-shadow:0 0 8px var(--orange);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.body::-webkit-scrollbar{width:4px}.body::-webkit-scrollbar-track{background:transparent}.body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .15s}
.card-header:hover{background:var(--surface-hover)}
.card-header .label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
.card-header .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--accent-glow);color:var(--accent)}
.card-header .chevron{color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.card-header.collapsed .chevron{transform:rotate(-90deg)}
.card-body{padding:0;max-height:500px;overflow:hidden;transition:max-height .3s ease}
.card-body.collapsed{max-height:0}
.model-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;animation:slideIn .2s ease both}
.model-row:last-child{border-bottom:none}.model-row:hover{background:var(--surface-hover)}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.chk{width:16px;height:16px;border-radius:3px;border:2px solid var(--border-bright);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chk.on{background:var(--accent);border-color:var(--accent)}.chk svg{opacity:0;transition:opacity .1s}.chk.on svg{opacity:1}
.model-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.model-tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;flex-shrink:0}
.tag-loaded{background:var(--green-glow);color:var(--green)}.tag-trb{background:var(--accent-glow);color:var(--accent)}
.actions-row{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--border)}
.action-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);cursor:pointer;transition:all .15s}
.action-btn:hover{background:var(--surface-hover);color:var(--text)}
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px}
.filename-row{display:flex;gap:8px;align-items:end}
.field{display:flex;flex-direction:column;gap:4px;flex:1}
.field label{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.03em}
.field input{font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.ext-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);padding:7px 0;flex-shrink:0}
.export-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:11px 20px;border-radius:6px;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#059669,#3dd68c);color:#fff;box-shadow:0 2px 12px rgba(61,214,140,.2)}
.export-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(61,214,140,.3)}
.export-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.progress-area{display:none}.progress-area.active{display:block}
.progress-track{height:3px;border-radius:2px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));width:0%;transition:width .3s}
.progress-info{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-top:5px}
.log-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.log-scroll{max-height:160px;overflow-y:auto;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.65}
.log-scroll::-webkit-scrollbar{width:3px}.log-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-line{display:flex;gap:8px}.log-t{color:var(--text-muted);flex-shrink:0}.log-m{color:var(--text-dim);word-break:break-all}
.log-m.i{color:var(--text)}.log-m.s{color:var(--green)}.log-m.w{color:var(--orange)}.log-m.e{color:var(--red)}
.info-banner{background:var(--accent-glow);border:1px solid rgba(79,143,247,.2);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--text-dim);line-height:1.5;display:flex;gap:8px}
.info-banner svg{flex-shrink:0;margin-top:1px}.info-banner strong{color:var(--text)}
.info-banner code{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px}
.empty{text-align:center;padding:24px 16px;color:var(--text-muted)}
.empty h3{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text-dim)}.empty p{font-size:11px;line-height:1.5}
.npm-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(203,56,55,.12);color:#e05a59;flex-shrink:0}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
  <h1>TrimBIM <span>Export</span></h1>
  <span class="npm-badge">v0.3.33</span>
  <div class="topbar-status"><div class="status-dot off" id="statusDot"></div><span id="statusLabel">Initializing...</span></div>
</div>
<div class="body">
  <div class="info-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    <div><strong>3D Viewer Extension</strong> — Uses <code>trimble-connect-workspace-api</code> to read loaded models and export as combined <strong>.trb</strong>.</div>
  </div>
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="label">Loaded Models (Current View)</span>
      <span class="count" id="loadedCount">0</span>
    </div>
    <div class="card-body" id="loadedBody">
      <div id="loadedList"><div class="empty"><h3>No models loaded</h3><p>Load IFC models in the 3D Viewer to see them here.</p></div></div>
      <div class="actions-row">
        <button class="action-btn" onclick="selectAllLoaded()">Select all</button>
        <button class="action-btn" onclick="deselectAll()">Deselect all</button>
        <button class="action-btn" onclick="refreshModels()">⟳ Refresh</button>
      </div>
    </div>
  </div>
  <div class="export-card">
    <div class="filename-row">
      <div class="field"><label>OUTPUT FILENAME</label><input type="text" id="filename" value="combined-view" placeholder="my-export"></div>
      <span class="ext-label">.trb</span>
    </div>
    <button class="export-btn" id="exportBtn" onclick="doExport()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export Current View as .trb
    </button>
    <div class="progress-area" id="progressArea">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-info"><span id="progressLabel">Preparing...</span><span id="progressPct">0%</span></div>
    </div>
  </div>
  <div class="log-area">
    <div class="card-header" onclick="toggleCard(this)">
      <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="label">Activity Log</span>
    </div>
    <div class="card-body"><div class="log-scroll" id="logScroll"></div></div>
  </div>
</div>

<!--
  CDN script = identical to: import * as Workspace from "trimble-connect-workspace-api"
  To switch to npm bundled build, see src/main.ts in the project files.
-->
<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<script>
// Alias CDN global to match npm import pattern:
//   import { WorkspaceAPI } from "trimble-connect-workspace-api"
//   import * as Workspace from "trimble-connect-workspace-api"
const Workspace = TrimbleConnectWorkspace;

let API = null, accessToken = null, projectInfo = null;
let loadedModels = [], selectedModelIds = new Set();
const $ = id => document.getElementById(id);

function log(msg, level = '') {
  const t = new Date().toTimeString().slice(0, 8);
  const el = $('logScroll');
  const d = document.createElement('div');
  d.className = 'log-line';
  d.innerHTML = '<span class="log-t">' + t + '</span><span class="log-m ' + level + '">' + msg + '</span>';
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function init() {
  log('Initializing trimble-connect-workspace-api...', 'i');
  try {
    API = await Workspace.connect(window.parent, function(event, data) { handleEvent(event, data); }, 30000);
    log('\u2713 WorkspaceAPI connected', 's');
    setStatus('on', 'Connected');

    try { projectInfo = await API.project.getProject(); log('Project: ' + projectInfo.name, 'i'); } catch(e) { log('project.getProject(): ' + e.message, 'w'); }

    try {
      var result = await API.extension.requestPermission('accesstoken');
      if (result && result !== 'pending' && result !== 'denied') { accessToken = result; log('\u2713 Access token acquired', 's'); }
      else log('Token: ' + result, 'w');
    } catch(e) { log('requestPermission: ' + e.message, 'w'); }

    await refreshModels();
  } catch(err) {
    log('Workspace.connect() failed: ' + err.message, 'e');
    log('Running demo mode', 'w');
    setStatus('off', 'Demo mode');
    loadDemoModels();
  }
}

function handleEvent(event, data) {
  if (event === 'extension.accessToken') { accessToken = data; log('Token refreshed', 'i'); }
  else if (event === 'viewer.modelState.changed') { log('Model state changed', ''); setTimeout(refreshModels, 500); }
}

async function refreshModels() {
  if (!API) return;
  setStatus('busy', 'Scanning...');
  log('viewer.getModels()...', 'i');
  try {
    var allModels = await API.viewer.getModels();
    log(allModels.length + ' models in project', '');
    var loaded = allModels.filter(function(m) { return m.state === 'LOADED'; });
    log(loaded.length + ' currently loaded', 'i');

    var trbModels = [];
    try { trbModels = await API.viewer.getTrimbimModels(); log('viewer.getTrimbimModels() \u2192 ' + trbModels.length + ' TRB blobs', 'i'); }
    catch(e) { log('getTrimbimModels: ' + e.message, 'w'); }

    loadedModels = loaded.map(function(m) {
      var trb = trbModels.find(function(t) { return t.id === m.id; });
      return { id: m.id, name: m.name, versionId: m.versionId, type: m.type || 'IFC', state: m.state, hasTrb: !!trb, trbBlob: trb ? trb.trbBlob : null, placement: m.placement || (trb ? trb.placement : null) };
    });
    renderModels();
    setStatus('on', loadedModels.length + ' loaded');
  } catch(err) { log('Error: ' + err.message, 'e'); setStatus('on', 'Error'); }
}

async function doExport() {
  if (selectedModelIds.size === 0) return;
  var selected = loadedModels.filter(function(m) { return selectedModelIds.has(m.id); });
  var fname = $('filename').value.trim() || 'combined-view';
  var btn = $('exportBtn'), area = $('progressArea'), fill = $('progressFill'), lbl = $('progressLabel'), pct = $('progressPct');

  btn.disabled = true; area.classList.add('active'); setStatus('busy', 'Exporting...');
  log('\u2550\u2550\u2550 EXPORT STARTED \u2550\u2550\u2550', 'i');
  log(selected.length + ' models \u2192 ' + fname + '.trb', 'i');

  var chunks = [];
  for (var i = 0; i < selected.length; i++) {
    var model = selected[i];
    var progress = Math.round((i / selected.length) * 80);
    fill.style.width = progress + '%'; pct.textContent = progress + '%';
    lbl.textContent = 'Fetching ' + model.name + '...';
    log('Fetching: ' + model.name, '');

    try {
      var trbData = model.trbBlob;

      if (!trbData && API) {
        var trbs = await API.viewer.getTrimbimModels();
        var match = trbs.find(function(t) { return t.id === model.id; });
        if (match && match.trbBlob) { trbData = match.trbBlob; log('  \u2713 TRB from viewer', 's'); }
      }

      if (!trbData && API && accessToken) {
        try {
          var fileInfo = await API.viewer.getLoadedModel(model.id);
          var base = 'https://app.connect.trimble.com';
          if (projectInfo && projectInfo.location === 'eu') base = 'https://app.europe.connect.trimble.com';
          var url = base + '/tc/api/2.0/files/' + (fileInfo.id || model.id) + '/trimbim';
          log('  GET ' + url, '');
          var resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
          if (resp.ok) { trbData = await resp.blob(); log('  \u2713 REST API (' + (trbData.size / 1e6).toFixed(1) + ' MB)', 's'); }
        } catch(e) { log('  REST: ' + e.message, 'w'); }
      }

      if (trbData) {
        var bytes;
        if (trbData instanceof Blob) bytes = new Uint8Array(await trbData.arrayBuffer());
        else if (typeof trbData === 'string') { var bin = atob(trbData); bytes = new Uint8Array(bin.length); for (var j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j); }
        else if (trbData instanceof Uint8Array) bytes = trbData;
        else bytes = new Uint8Array(trbData);
        chunks.push({ name: model.name, id: model.id, data: bytes, placement: model.placement });
        log('  \u2713 ' + model.name + ' (' + (bytes.length / 1e6).toFixed(1) + ' MB)', 's');
      } else { log('  \u26A0 No TRB data', 'w'); }
    } catch(err) { log('  \u2717 ' + err.message, 'e'); }
    await new Promise(function(r) { setTimeout(r, 100); });
  }

  fill.style.width = '85%'; pct.textContent = '85%'; lbl.textContent = 'Packaging .trb...';
  log('Building TrimBIM container...', 'i');
  await new Promise(function(r) { setTimeout(r, 200); });

  var blob;
  if (chunks.length === 1) blob = new Blob([chunks[0].data], { type: 'application/octet-stream' });
  else if (chunks.length > 1) { blob = buildCombinedTrb(chunks); log('Combined ' + chunks.length + ' models', 'i'); }
  else { log('No TRB data. Load models in viewer first.', 'e'); area.classList.remove('active'); btn.disabled = false; setStatus('on', loadedModels.length + ' loaded'); return; }

  fill.style.width = '95%'; pct.textContent = '95%'; lbl.textContent = 'Downloading...';
  var dlUrl = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = dlUrl; a.download = fname + '.trb';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(dlUrl);

  fill.style.width = '100%'; pct.textContent = '100%'; lbl.textContent = 'Done!';
  log('\u2713 ' + fname + '.trb (' + (blob.size / 1e6).toFixed(2) + ' MB)', 's');
  log('\u2550\u2550\u2550 EXPORT COMPLETE \u2550\u2550\u2550', 's');
  btn.disabled = false; setStatus('on', loadedModels.length + ' loaded');
  setTimeout(function() { area.classList.remove('active'); fill.style.width = '0%'; }, 2500);
}

function buildCombinedTrb(chunks) {
  var enc = new TextEncoder();
  var names = chunks.map(function(c) { return enc.encode(c.name || 'model_' + c.id); });
  var tocSize = 16;
  for (var n of names) tocSize += 2 + n.length + 48 + 4 + 4;
  var total = tocSize;
  for (var c of chunks) total += c.data.length;

  var buf = new ArrayBuffer(total), dv = new DataView(buf), u8 = new Uint8Array(buf), off = 0;
  u8[off++]=0x54; u8[off++]=0x52; u8[off++]=0x42; u8[off++]=0x00;
  dv.setUint32(off,2,true); off+=4; dv.setUint32(off,0x01,true); off+=4; dv.setUint32(off,chunks.length,true); off+=4;

  var dataOff = tocSize;
  for (var i = 0; i < chunks.length; i++) {
    var nm = names[i];
    dv.setUint16(off, nm.length, true); off += 2;
    u8.set(nm, off); off += nm.length;
    var pl = chunks[i].placement, pos = (pl && pl.position) || {x:0,y:0,z:0}, rot = (pl && pl.rotation) || {x:0,y:0,z:0};
    dv.setFloat64(off,pos.x||0,true); off+=8; dv.setFloat64(off,pos.y||0,true); off+=8; dv.setFloat64(off,pos.z||0,true); off+=8;
    dv.setFloat64(off,rot.x||0,true); off+=8; dv.setFloat64(off,rot.y||0,true); off+=8; dv.setFloat64(off,rot.z||0,true); off+=8;
    dv.setUint32(off, dataOff, true); off += 4; dv.setUint32(off, chunks[i].data.length, true); off += 4;
    dataOff += chunks[i].data.length;
  }
  for (var c of chunks) { u8.set(c.data, off); off += c.data.length; }
  return new Blob([buf], { type: 'application/octet-stream' });
}

function renderModels() {
  var container = $('loadedList');
  $('loadedCount').textContent = loadedModels.length;
  if (loadedModels.length === 0) { container.innerHTML = '<div class="empty"><h3>No models loaded</h3><p>Load IFC files in the 3D Viewer, then click Refresh.</p></div>'; updateExportBtn(); return; }
  container.innerHTML = loadedModels.map(function(m, i) {
    var sel = selectedModelIds.has(m.id), tc = m.hasTrb ? 'tag-trb' : 'tag-loaded', tt = m.hasTrb ? 'TRB READY' : m.type.toUpperCase();
    return '<div class="model-row" data-id="'+m.id+'" style="animation-delay:'+i*0.03+'s"><div class="chk '+(sel?'on':'')+'"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><span class="model-name" title="'+m.name+'">'+m.name+'</span><span class="model-tag '+tc+'">'+tt+'</span></div>';
  }).join('');
  container.querySelectorAll('.model-row').forEach(function(row) { row.addEventListener('click', function() { toggleSel(row.dataset.id); }); });
  updateExportBtn();
}

function toggleSel(id) { if (selectedModelIds.has(id)) selectedModelIds.delete(id); else selectedModelIds.add(id); renderModels(); }
function selectAllLoaded() { loadedModels.forEach(function(m) { selectedModelIds.add(m.id); }); renderModels(); log('Selected ' + selectedModelIds.size + ' models', 'i'); }
function deselectAll() { selectedModelIds.clear(); renderModels(); }
function updateExportBtn() { var btn=$('exportBtn'), n=selectedModelIds.size; btn.disabled=n===0; var svg='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>'; btn.innerHTML=svg+(n>0?' Export '+n+' model'+(n>1?'s':'')+' as .trb':' Export Current View as .trb'); }
function toggleCard(h) { h.classList.toggle('collapsed'); h.nextElementSibling.classList.toggle('collapsed'); }
function setStatus(s, l) { $('statusDot').className='status-dot '+s; $('statusLabel').textContent=l; }

function loadDemoModels() {
  loadedModels = [
    {id:'d1',name:'Architecture_MainBuilding.ifc',type:'IFC',state:'LOADED',versionId:'v1',hasTrb:true,trbBlob:null,placement:{position:{x:0,y:0,z:0}}},
