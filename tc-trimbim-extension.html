<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrimBIM Export v0.3.35</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--s1:#171a24;--s2:#1e2230;--sh:#262b3a;--b:#2a3040;--bb:#3a4158;--t:#e4e8f0;--td:#8992ab;--tm:#505872;--a:#4d90f0;--ag:rgba(77,144,240,.12);--g:#3cd48a;--gg:rgba(60,212,138,.12);--o:#f0a030;--r:#ef6b6b;--rad:8px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--b);flex-shrink:0}
.top-ico{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--a),var(--g));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top h1{font-size:13px;font-weight:700}.top h1 span{color:var(--a);font-weight:500}
.ver{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--ag);color:var(--a)}
.top-st{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--td)}
.dot{width:6px;height:6px;border-radius:50%}
.dot-off{background:var(--tm)}.dot-on{background:var(--g);box-shadow:0 0 8px var(--g)}.dot-busy{background:var(--o);box-shadow:0 0 6px var(--o);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.body::-webkit-scrollbar{width:4px}.body::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.card{background:var(--s1);border:1px solid var(--b);border-radius:var(--rad);overflow:hidden}
.ch{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--b);cursor:pointer;user-select:none}
.ch:hover{background:var(--sh)}
.ch .lb{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tm)}
.ch .ct{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--ag);color:var(--a)}
.ch .cv{color:var(--tm);transition:transform .2s;flex-shrink:0}.ch.shut .cv{transform:rotate(-90deg)}
.cb{max-height:600px;overflow:hidden;transition:max-height .25s ease}.cb.shut{max-height:0}
.mr{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.mr:last-child{border-bottom:none}.mr:hover{background:var(--sh)}
.ck{width:15px;height:15px;border-radius:3px;border:2px solid var(--bb);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.ck.on{background:var(--a);border-color:var(--a)}.ck svg{opacity:0;transition:opacity .1s}.ck.on svg{opacity:1}
.mn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.mt{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;flex-shrink:0}
.mt-ifc{background:var(--ag);color:var(--a)}.mt-trb{background:var(--gg);color:var(--g)}.mt-oth{background:var(--s2);color:var(--tm)}
.ar{display:flex;gap:5px;padding:8px 12px;border-top:1px solid var(--b)}
.ab{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:4px 9px;border-radius:4px;border:1px solid var(--b);background:var(--s2);color:var(--td);cursor:pointer}.ab:hover{background:var(--sh);color:var(--t)}
.ec{background:var(--s1);border:1px solid var(--b);border-radius:var(--rad);padding:12px;display:flex;flex-direction:column;gap:9px}
.fr{display:flex;gap:7px;align-items:end}
.fd{display:flex;flex-direction:column;gap:3px;flex:1}
.fd label{font-size:10px;font-weight:600;color:var(--tm);letter-spacing:.03em}
.fd input{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 9px;border-radius:4px;border:1px solid var(--b);background:var(--bg);color:var(--t);outline:none}
.fd input:focus{border-color:var(--a);box-shadow:0 0 0 2px var(--ag)}
.el{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tm);padding:6px 0;flex-shrink:0}
.eb{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:10px 18px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;background:linear-gradient(135deg,#059669,#3cd48a);color:#fff;box-shadow:0 2px 10px rgba(60,212,138,.2);transition:all .2s}
.eb:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(60,212,138,.3)}.eb:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.pa{display:none}.pa.on{display:block}.pt{height:3px;border-radius:2px;background:var(--b);overflow:hidden}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a),var(--g));width:0%;transition:width .3s}
.pi{display:flex;justify-content:space-between;font-size:10px;color:var(--td);margin-top:4px}
.la{background:var(--s1);border:1px solid var(--b);border-radius:var(--rad);overflow:hidden}
.ls{max-height:200px;overflow-y:auto;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.6}
.ls::-webkit-scrollbar{width:3px}.ls::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.ll{display:flex;gap:7px}.lt{color:var(--tm);flex-shrink:0}.lm{color:var(--td);word-break:break-all}
.lm.i{color:var(--t)}.lm.s{color:var(--g)}.lm.w{color:var(--o)}.lm.e{color:var(--r)}
.ib{background:var(--ag);border:1px solid rgba(77,144,240,.18);border-radius:var(--rad);padding:9px 11px;font-size:11px;color:var(--td);line-height:1.45;display:flex;gap:7px}
.ib svg{flex-shrink:0;margin-top:1px}.ib strong{color:var(--t)}
.ib code{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(0,0,0,.25);padding:1px 4px;border-radius:3px}
.em{text-align:center;padding:20px 14px;color:var(--tm)}.em h3{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--td)}.em p{font-size:11px;line-height:1.45}
</style>
</head>
<body>
<div class="top">
  <div class="top-ico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
  <h1>TrimBIM <span>Export</span></h1>
  <span class="ver">v0.3.35</span>
  <div class="top-st"><div class="dot dot-off" id="dot"></div><span id="stxt">Starting...</span></div>
</div>
<div class="body">
  <div class="ib">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    <div>Export loaded IFC/TRB files from the current 3D view as <strong>.trb</strong> downloads. Uses <code>trimble-connect-workspace-api</code> + TC Core REST API.</div>
  </div>

  <div class="card">
    <div class="ch" onclick="tog(this)">
      <svg class="cv" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="lb">Project Files</span>
      <span class="ct" id="fct">0</span>
    </div>
    <div class="cb" id="flist-wrap">
      <div id="flist"><div class="em"><h3>Connecting...</h3><p>Waiting for Workspace API connection.</p></div></div>
      <div class="ar">
        <button class="ab" onclick="selAll()">Select all</button>
        <button class="ab" onclick="selNone()">Deselect</button>
        <button class="ab" onclick="refresh()">&#x21BB; Refresh</button>
      </div>
    </div>
  </div>

  <div class="ec">
    <div class="fr">
      <div class="fd"><label>OUTPUT FILENAME</label><input type="text" id="fname" value="combined-export" placeholder="filename"></div>
      <span class="el">.trb</span>
    </div>
    <button class="eb" id="xbtn" onclick="doExport()" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export as .trb
    </button>
    <div class="pa" id="prog">
      <div class="pt"><div class="pf" id="pbar"></div></div>
      <div class="pi"><span id="ptxt">...</span><span id="ppct">0%</span></div>
    </div>
  </div>

  <div class="la">
    <div class="ch" onclick="tog(this)">
      <svg class="cv" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="lb">Activity Log</span>
    </div>
    <div class="cb"><div class="ls" id="log"></div></div>
  </div>
</div>

<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<script>
/*
 * TrimBIM Export v0.3.35 — Clean rebuild
 *
 * Architecture:
 * 1. Connect to TC 3D Viewer via Workspace API
 * 2. Get access token via extension.requestPermission
 * 3. Discover the correct regional API URL via /regions endpoint
 * 4. List project files via getModels() — these are ACTUAL files with real names & file IDs
 * 5. On export: download each file via Core API GET /files/{id}/content
 * 6. Package as .trb and trigger browser download
 *
 * Key insight: getModels() returns project FILES (ifc, trb, etc)
 *              getTrimbimModels() returns INTERNAL viewer sub-models (not useful for download)
 *              The file download uses the Core API, not the Workspace API
 */

const W = TrimbleConnectWorkspace;
let API = null, token = null, project = null, regionUrl = null;
let files = [], sel = new Set();
const $ = id => document.getElementById(id);

// ── LOG ──
function L(m, c) {
  const t = new Date().toTimeString().slice(0,8);
  const el = $('log');
  el.innerHTML += '<div class="ll"><span class="lt">'+t+'</span><span class="lm '+(c||'')+'">'+m+'</span></div>';
  el.scrollTop = el.scrollHeight;
}

// ── STATUS ──
function S(dot, txt) {
  $('dot').className = 'dot dot-' + dot;
  $('stxt').textContent = txt;
}

// ── TOGGLE CARD ──
function tog(el) { el.classList.toggle('shut'); el.nextElementSibling.classList.toggle('shut'); }

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function init() {
  L('TrimBIM Export v0.3.35', 'i');

  try {
    API = await W.connect(window.parent, onEvent, 30000);
    L('✓ Workspace API connected', 's');
    S('on', 'Connected');
  } catch(e) {
    L('Workspace connect failed: ' + e.message, 'e');
    S('off', 'Not connected');
    $('flist').innerHTML = '<div class="em"><h3>Not inside Trimble Connect</h3><p>This extension must run inside the TC 3D Viewer.</p></div>';
    return;
  }

  // Get project
  try {
    project = await API.project.getProject();
    L('Project: ' + project.name, 'i');
    L('Project ID: ' + project.id, '');
    // Log project object keys to understand structure
    L('Project keys: ' + Object.keys(project).join(', '), '');
  } catch(e) { L('getProject: ' + e.message, 'w'); }

  // Get token
  try {
    var r = await API.extension.requestPermission('accesstoken');
    if (r && r !== 'pending' && r !== 'denied') {
      token = r;
      L('✓ Token acquired (' + token.substring(0,12) + '...)', 's');
    } else {
      L('Token status: ' + r, 'w');
    }
  } catch(e) { L('Token: ' + e.message, 'w'); }

  // Discover region
  if (token) await findRegion();

  // Load file list
  await refresh();
}

function onEvent(ev, data) {
  if (ev === 'extension.accessToken') { token = data; L('Token refreshed', 'i'); }
  if (ev === 'viewer.modelState.changed') { L('Models changed, refreshing...', ''); setTimeout(refresh, 500); }
}

// ══════════════════════════════════════════════
//  REGION DISCOVERY
// ══════════════════════════════════════════════
async function findRegion() {
  L('Discovering API region...', 'i');

  // Step 1: Call the master regions endpoint
  try {
    var resp = await fetch('https://app.connect.trimble.com/tc/api/2.0/regions', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var regions = await resp.json();
    L('Regions found: ' + regions.length, 'i');

    // Log each region
    regions.forEach(function(r, i) {
      L('  [' + i + '] ' + (r.name||'?') + ' → ' + (r.origin||'no origin'), '');
    });

    // Try each region to find our project
    for (var i = 0; i < regions.length; i++) {
      var r = regions[i];
      if (!r.origin) continue;
      var testUrl = r.origin + '/tc/api/2.0/projects/' + project.id;
      try {
        var test = await fetch(testUrl, { headers: { 'Authorization': 'Bearer ' + token } });
        if (test.ok) {
          regionUrl = r.origin + '/tc/api/2.0';
          L('✓ Project found in: ' + r.name + ' (' + regionUrl + ')', 's');
          return;
        } else {
          L('  ' + r.name + ': HTTP ' + test.status, '');
        }
      } catch(e) { L('  ' + r.name + ': ' + e.message, ''); }
    }
  } catch(e) {
    L('Regions endpoint failed: ' + e.message, 'w');
  }

  // Fallback: try well-known URLs directly
  var fallbacks = [
    'https://app.connect.trimble.com/tc/api/2.0',
    'https://app.europe.connect.trimble.com/tc/api/2.0',
    'https://app.asia.connect.trimble.com/tc/api/2.0'
  ];
  for (var f = 0; f < fallbacks.length; f++) {
    try {
      var fb = await fetch(fallbacks[f] + '/projects/' + project.id, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (fb.ok) {
        regionUrl = fallbacks[f];
        L('✓ Region (fallback): ' + regionUrl, 's');
        return;
      }
    } catch(e) {}
  }

  L('✗ Could not find project region. File download will not work.', 'e');
}

// ══════════════════════════════════════════════
//  REFRESH FILE LIST
//  Uses getModels() — returns actual project files
//  with real names, file IDs, and types
// ══════════════════════════════════════════════
async function refresh() {
  if (!API) return;
  S('busy', 'Loading...');
  L('Loading file list...', 'i');

  try {
    // getModels() returns ModelSpec[] = actual project files
    // Each has: id, name, state, type, versionId, placement
    var models = await API.viewer.getModels();
    L('getModels() returned ' + models.length + ' files', 'i');

    // Log states for debugging
    var states = {};
    models.forEach(function(m) { states[m.state] = (states[m.state]||0) + 1; });
    L('States: ' + JSON.stringify(states), '');

    // Log first 5 files for debugging
    models.slice(0,5).forEach(function(m) {
      L('  ' + m.name + ' [' + m.state + '] type=' + (m.type||'?') + ' id=' + m.id.substring(0,10), '');
    });

    // Build file list — include ALL files, not just "LOADED" state
    // The user can see what's available and select what they want
    files = models.map(function(m) {
      var ext = (m.name||'').split('.').pop().toLowerCase();
      return {
        id: m.id,
        name: m.name || 'Unknown',
        state: m.state || '',
        type: m.type || ext.toUpperCase(),
        ext: ext,
        versionId: m.versionId || '',
        placement: m.placement || null
      };
    });

    // Sort: IFC first, then TRB, then others. Within each group, alphabetical
    files.sort(function(a, b) {
      var oa = a.ext === 'ifc' ? 0 : a.ext === 'trb' ? 1 : 2;
      var ob = b.ext === 'ifc' ? 0 : b.ext === 'trb' ? 1 : 2;
      return oa - ob || a.name.localeCompare(b.name);
    });

    render();
    S('on', files.length + ' files');
    L(files.length + ' files listed', 's');

  } catch(e) {
    L('Error loading files: ' + e.message, 'e');
    S('on', 'Error');
  }
}

// ══════════════════════════════════════════════
//  RENDER FILE LIST
// ══════════════════════════════════════════════
function render() {
  var el = $('flist');
  $('fct').textContent = files.length;

  if (!files.length) {
    el.innerHTML = '<div class="em"><h3>No files found</h3><p>No model files found in this project.</p></div>';
    updBtn(); return;
  }

  el.innerHTML = files.map(function(f) {
    var on = sel.has(f.id);
    var ext = f.ext.toUpperCase();
    var tc = f.ext === 'ifc' ? 'mt-ifc' : f.ext === 'trb' ? 'mt-trb' : 'mt-oth';
    return '<div class="mr" data-id="'+f.id+'">' +
      '<div class="ck '+(on?'on':'')+'">' +
        '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' +
      '</div>' +
      '<span class="mn" title="'+f.name+'">'+f.name+'</span>' +
      '<span class="mt '+tc+'">'+ext+'</span>' +
    '</div>';
  }).join('');

  el.querySelectorAll('.mr').forEach(function(row) {
    row.addEventListener('click', function() {
      var id = row.dataset.id;
      if (sel.has(id)) sel.delete(id); else sel.add(id);
      render();
    });
  });

  updBtn();
}

function selAll() { files.forEach(function(f) { sel.add(f.id); }); render(); L('Selected all ' + sel.size + ' files', 'i'); }
function selNone() { sel.clear(); render(); }

function updBtn() {
  var b = $('xbtn'), n = sel.size;
  b.disabled = !n || !regionUrl;
  var sv = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';
  if (!regionUrl) {
    b.innerHTML = sv + ' No API region found';
  } else {
    b.innerHTML = sv + (n ? ' Export ' + n + ' file' + (n>1?'s':'') + ' as .trb' : ' Select files to export');
  }
}

// ══════════════════════════════════════════════
//  EXPORT
//  Downloads each selected file via Core API
//  then packages into a single .trb download
// ══════════════════════════════════════════════
async function doExport() {
  if (!sel.size || !regionUrl) return;

  var chosen = files.filter(function(f) { return sel.has(f.id); });
  var fname = $('fname').value.trim() || 'combined-export';
  var btn = $('xbtn'), prog = $('prog'), bar = $('pbar'), ptxt = $('ptxt'), ppct = $('ppct');

  btn.disabled = true;
  prog.classList.add('on');
  S('busy', 'Exporting...');

  L('═══ EXPORT START ═══', 'i');
  L(chosen.length + ' files → ' + fname + '.trb', 'i');

  var chunks = [];

  for (var i = 0; i < chosen.length; i++) {
    var f = chosen[i];
    var pct = Math.round(((i+1) / chosen.length) * 85);
    bar.style.width = pct + '%';
    ppct.textContent = pct + '%';
    ptxt.textContent = 'Downloading ' + f.name + '...';
    L('Downloading: ' + f.name + ' (id: ' + f.id.substring(0,12) + ')', 'i');

    try {
      // Download file content via TC Core API
      var url = regionUrl + '/files/' + f.id + '/content';
      L('  GET ' + url, '');

      var resp = await fetch(url, {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (resp.ok) {
        var blob = await resp.blob();
        var bytes = new Uint8Array(await blob.arrayBuffer());
        chunks.push({ name: f.name, data: bytes, placement: f.placement });
        L('  ✓ ' + f.name + ' (' + (bytes.length / 1e6).toFixed(2) + ' MB)', 's');
      } else {
        var errTxt = '';
        try { errTxt = await resp.text(); } catch(e2) {}
        L('  ✗ HTTP ' + resp.status + ' ' + errTxt.substring(0,100), 'e');

        // If content download failed, try version-specific download
        if (f.versionId) {
          var vUrl = regionUrl + '/files/' + f.id + '/versions/' + f.versionId + '/content';
          L('  Trying version URL...', '');
          try {
            var vResp = await fetch(vUrl, { headers: { 'Authorization': 'Bearer ' + token } });
            if (vResp.ok) {
              var vBlob = await vResp.blob();
              var vBytes = new Uint8Array(await vBlob.arrayBuffer());
              chunks.push({ name: f.name, data: vBytes, placement: f.placement });
              L('  ✓ ' + f.name + ' via version (' + (vBytes.length / 1e6).toFixed(2) + ' MB)', 's');
            } else {
              L('  ✗ Version: HTTP ' + vResp.status, 'e');
            }
          } catch(e3) { L('  Version download: ' + e3.message, 'e'); }
        }
      }
    } catch(e) {
      L('  ✗ Network error: ' + e.message, 'e');
    }

    await new Promise(function(r) { setTimeout(r, 50); });
  }

  // Package
  bar.style.width = '90%'; ppct.textContent = '90%';
  ptxt.textContent = 'Packaging...';

  if (!chunks.length) {
    L('✗ No files downloaded successfully', 'e');
    prog.classList.remove('on');
    btn.disabled = false;
    S('on', files.length + ' files');
    return;
  }

  var output;
  if (chunks.length === 1 && chunks[0].name.toLowerCase().endsWith('.trb')) {
    // Single TRB file — download as-is
    output = new Blob([chunks[0].data], { type: 'application/octet-stream' });
    L('Single TRB — passing through', 'i');
  } else {
    // Multiple files or IFC — combine into TRB container
    output = makeTrb(chunks);
    L('Packaged ' + chunks.length + ' files into TRB container', 'i');
  }

  // Download
  bar.style.width = '95%'; ppct.textContent = '95%'; ptxt.textContent = 'Downloading...';

  var dlUrl = URL.createObjectURL(output);
  var a = document.createElement('a');
  a.href = dlUrl;
  a.download = fname + '.trb';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(dlUrl);

  bar.style.width = '100%'; ppct.textContent = '100%'; ptxt.textContent = 'Done!';
  L('✓ ' + fname + '.trb (' + (output.size / 1e6).toFixed(2) + ' MB)', 's');
  L('═══ EXPORT COMPLETE ═══', 's');

  btn.disabled = false;
  S('on', files.length + ' files');
  setTimeout(function() { prog.classList.remove('on'); bar.style.width = '0%'; }, 2000);
}

// ══════════════════════════════════════════════
//  TRB CONTAINER BUILDER
//  Header: TRB\0 + version(4) + flags(4) + count(4)
//  TOC per file: nameLen(2) + name + placement(48) + offset(4) + size(4)
//  Data blocks follow
// ══════════════════════════════════════════════
function makeTrb(chunks) {
  var enc = new TextEncoder();
  var names = chunks.map(function(c) { return enc.encode(c.name); });

  var hdr = 16;
  for (var i = 0; i < names.length; i++) hdr += 2 + names[i].length + 48 + 8;

  var total = hdr;
  for (var i = 0; i < chunks.length; i++) total += chunks[i].data.length;

  var buf = new ArrayBuffer(total);
  var dv = new DataView(buf);
  var u8 = new Uint8Array(buf);
  var o = 0;

  // Header
  u8[o++]=0x54; u8[o++]=0x52; u8[o++]=0x42; u8[o++]=0x00;
  dv.setUint32(o,2,true); o+=4;   // version
  dv.setUint32(o,0x01,true); o+=4; // flags: combined
  dv.setUint32(o,chunks.length,true); o+=4;

  // TOC
  var doff = hdr;
  for (var i = 0; i < chunks.length; i++) {
    dv.setUint16(o, names[i].length, true); o += 2;
    u8.set(names[i], o); o += names[i].length;

    var pl = chunks[i].placement;
    var px = pl && pl.position ? pl.position : {x:0,y:0,z:0};
    var pr = pl && pl.rotation ? pl.rotation : {x:0,y:0,z:0};
    dv.setFloat64(o,px.x||0,true); o+=8;
    dv.setFloat64(o,px.y||0,true); o+=8;
    dv.setFloat64(o,px.z||0,true); o+=8;
    dv.setFloat64(o,pr.x||0,true); o+=8;
    dv.setFloat64(o,pr.y||0,true); o+=8;
    dv.setFloat64(o,pr.z||0,true); o+=8;

    dv.setUint32(o, doff, true); o += 4;
    dv.setUint32(o, chunks[i].data.length, true); o += 4;
    doff += chunks[i].data.length;
  }

  // Data
  for (var i = 0; i < chunks.length; i++) {
    u8.set(chunks[i].data, o);
    o += chunks[i].data.length;
  }

  return new Blob([buf], { type: 'application/octet-stream' });
}

// ── BOOT ──
init();
